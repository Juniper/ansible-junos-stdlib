bugfixes:
  - Renamed ``juniper.device`` action plugins to carry the ``junos_`` prefix matching
    their corresponding module names, fixing the ``action-plugin-docs`` sanity test
    failures. Added ``plugin_routing.action`` redirects in ``juniper.device`` and
